    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Espanhol Pro">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg/150px-Tour_Eiffel_Wikimedia_Commons.jpg">

    <title>Espanhol Pro - Domine a Pronúncia</title>
    <style>
        /* CSS RESET & VARIAVEIS DE CORES DARK */
        :root {
            --bg-page: #050507; 
            --app-bg: #121216; 
            --frame-border: #2a2a30; 
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #9aa0a6;
            --accent-blue: #00e5ff; 
            --accent-hover: #00b8d4;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-page);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            background-color: var(--app-bg);
            width: 100%;
            max-width: 420px; 
            height: 100%;
            max-height: 850px; 
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255,255,255,0.01);
        }

        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-primary); }
        header p { font-size: 11px; color: var(--accent-blue); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}

        .quadro-wrapper {
            padding: 20px 20px 0 20px;
        }

        .quadro-imagem {
            width: 100%;
            height: 190px; 
            border-radius: 16px; 
            border: 6px solid var(--frame-border); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.3);
            background-color: #2a2a30; 
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .tag-local {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .display-frase {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px 25px;
            text-align: center;
        }

        .frase-alvo { font-size: 26px; font-weight: 800; line-height: 1.3; color: var(--text-primary); margin-bottom: 8px; word-wrap: break-word; }
        .traducao { font-size: 16px; color: var(--accent-blue); font-style: italic; font-weight: 500; margin-bottom: 20px; opacity: 0.9; }
        
        .feedback-area {
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .resultado { font-size: 22px; font-weight: 700; }
        .correto { color: var(--success-green); }
        .errado { color: var(--error-red); text-decoration: underline; text-underline-offset: 4px; }
        .status-msg { font-size: 13px; color: var(--text-secondary); font-weight: 600; margin-top: 8px;}

        .controles-container {
            padding: 10px 20px 20px 20px;
        }

        .controles-voz { display: flex; justify-content: center; gap: 12px; }

        .btn-action {
            flex: 1;
            border: none;
            padding: 14px 0;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #fff;
        }

        .btn-ouvir { background-color: rgba(255,255,255,0.06); border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-ouvir:hover { background-color: rgba(255,255,255,0.1); }

        .btn-gravar { background-color: var(--accent-blue); box-shadow: 0 4px 15px rgba(0,229,255,0.25); color: #000; }
        .btn-gravar:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-gravar.gravando { animation: pulsarRed 1.5s infinite; background-color: var(--error-red); color: #fff; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }

        @keyframes pulsarRed {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .painel-rodape {
            background: rgba(0,0,0,0.4);
            border-top: 1px solid var(--border-color);
            padding: 15px;
        }

        .titulo-licoes { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; padding-left: 5px;}

        .painel-botoes {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            max-height: 130px; 
            overflow-y: auto;
            padding-right: 5px; 
        }
        
        .painel-botoes::-webkit-scrollbar { width: 4px; }
        .painel-botoes::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .botao-numero {
            background-color: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s ease;
            text-align: center;
        }

        .botao-numero:hover { background-color: rgba(255,255,255,0.1); color: var(--text-primary); }
        .botao-numero.ativo { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(0,229,255,0.08); }
        .botao-numero.concluido { background-color: var(--success-green); color: #fff; border-color: transparent; }

        @media (min-height: 850px) {
            .app-container { height: 95vh; }
        }
    </style>
</head>

        ];

        const dom = {
            quadro: document.getElementById('quadroImagem'), 
            painel: document.getElementById('painelBotoes'),
            frase: document.getElementById('fraseAlvo'),
            pt: document.getElementById('traducaoPt'),
            btnGravar: document.getElementById('btnGravar'),
            lblGravar: document.getElementById('lbl-gravar'),
            btnOuvir: document.getElementById('btnOuvir'),
            status: document.getElementById('status'),
            resultado: document.getElementById('resultadoTela'),
            tagLocal: document.getElementById('tagLocal')
        };

        let indiceAtual = 0;
        let fraseAtualEspanhol = ""; 
        
        // Novo ID no local storage para não dar conflito com os testes antigos
        let progressoSalvo = JSON.parse(localStorage.getItem('progressoEspanholProV3')) || [];
        
        let isRecording = false; 

        // --- MOTOR DE ÁUDIO NATIVO (SONS DE ACERTO/ERRO) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function tocarSomAcerto() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        function tocarSomErro() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        // --- SISTEMA DE VOZ DO ROBÔ ---
        dom.btnOuvir.addEventListener('click', () => {
            initAudio(); 
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const robo = new SpeechSynthesisUtterance(fraseAtualEspanhol);
                robo.lang = 'es-ES'; 
                robo.rate = 0.85; 
                window.speechSynthesis.speak(robo);
            }
        });

        function inicializarApp() {
            for (let i = 0; i < listaDeFrases.length; i++) {
                let botao = document.createElement("button");
                botao.innerText = (i + 1).toString().padStart(3, '0');
                botao.className = "botao-numero";
                botao.id = "btn-" + i;
                if (progressoSalvo.includes(i)) botao.classList.add('concluido');
                
                botao.addEventListener("click", () => {
                    initAudio();
                    mudarFrase(i);
                });
                
                dom.painel.appendChild(botao);
            }
            mudarFrase(progressoSalvo.length > 0 ? Math.min(Math.max(...progressoSalvo) + 1, listaDeFrases.length - 1) : 0);
        }

        function mudarFrase(indice) {
            indiceAtual = indice;
            fraseAtualEspanhol = listaDeFrases[indice].es;
            dom.frase.innerText = fraseAtualEspanhol;
            dom.pt.innerText = listaDeFrases[indice].pt;
            
            document.querySelectorAll('.botao-numero').forEach(b => b.classList.remove('ativo'));
            const btn = document.getElementById("btn-" + indice);
            if(btn) {
                btn.classList.add('ativo');
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            dom.resultado.innerHTML = "";
            dom.status.innerText = "Aperte 'Falar' e repita a frase.";
            dom.status.style.color = "var(--text-secondary)";

            const imgSorteada = imagensDeFundo[Math.floor(Math.random() * imagensDeFundo.length)];
            dom.quadro.style.backgroundImage = `url('${imgSorteada.url}')`;
            dom.tagLocal.innerText = `📍 ${imgSorteada.nome}`;
            
            if (isRecording) {
                 dom.btnGravar.click(); 
            }
        }

        // --- SISTEMA ROBUSTO DO MICROFONE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null; 

        if (SpeechRecognition) {
            dom.btnGravar.addEventListener('click', () => {
                
                // Se já estiver gravando, pára a gravação atual
                if (isRecording && recognition) {
                    try { recognition.stop(); } catch(e) {}
                    return;
                }
                
                // Sempre cria uma nova instância para evitar "congelamentos" da API
                recognition = new SpeechRecognition();
                recognition.lang = 'es-ES'; 
                recognition.interimResults = false;

                recognition.onstart = () => {
                    isRecording = true;
                    dom.btnGravar.classList.add('gravando');
                    dom.lblGravar.innerText = "Parar"; 
                    dom.status.innerText = "🎤 Escuchando... ¡Habla ahora!";
                    dom.status.style.color = "var(--accent-blue)"; 
                    dom.resultado.innerHTML = "";
                };

                recognition.onend = () => {
                    isRecording = false;
                    dom.btnGravar.classList.remove('gravando');
                    dom.lblGravar.innerText = "Falar";
                };

                recognition.onresult = (evento) => {
                    const fraseFalada = evento.results[0][0].transcript;
                    dom.status.innerText = `Você pronunciou: "${fraseFalada}"`;
                    dom.status.style.color = "var(--text-secondary)";
                    analisarPronuncia(fraseAtualEspanhol, fraseFalada);
                };

                recognition.onerror = (evento) => {
                    dom.status.innerText = "❌ No entendí o hubo un error. Inténtalo de nuevo.";
                    dom.status.style.color = "var(--error-red)";
                    isRecording = false;
                    dom.btnGravar.classList.remove('gravando');
                    dom.lblGravar.innerText = "Falar";
                };

                try { recognition.start(); } catch(e) {}
            });

        } else {
            dom.status.innerText = "⚠️ Seu navegador não suporta reconhecimento de voz.";
            dom.btnGravar.style.display = "none";
        }

        // --- LÓGICA DE COMPARAÇÃO DE PRONÚNCIA ---
        function analisarPronuncia(alvo, falada) {
            
            // Remove pontuações invertidas e acentos magicamente para o computador entender!
            const limparTexto = (texto) => {
                return texto.toLowerCase()
                            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                            .replace(/[.,!?¡¿]/g, "")
                            .trim();
            };
            
            let alvoLimpo = limparTexto(alvo).split(" ");
            let faladaLimpa = limparTexto(falada).split(" ");
            let palabrasOriginais = alvo.split(" "); // Guarda original para mostrar na tela

            let htmlFinal = "";
            let acertouTudo = true;

            for (let i = 0; i < alvoLimpo.length; i++) {
                let pCerta = alvoLimpo[i];
                let pDita = faladaLimpa[i] || ""; 
                let pVisual = palabrasOriginais[i] || pCerta; // Pega a palavra original com pontuação/acento

                if (pCerta === pDita) {
                    htmlFinal += `<span class="correto">${pVisual} </span>`;
                } else {
                    htmlFinal += `<span class="errado">${pVisual} </span>`;
                    acertouTudo = false;
                }
            }

            dom.resultado.innerHTML = htmlFinal;

            if (acertouTudo) {
                tocarSomAcerto(); 
                dom.status.innerText = "🎉 ¡Pronunciación Perfecta! Gold Star!";
                dom.status.style.color = "var(--success-green)";
                
                if (!progressoSalvo.includes(indiceAtual)) {
                    progressoSalvo.push(indiceAtual);
                    localStorage.setItem('progressoEspanholProV3', JSON.stringify(progressoSalvo));
                    document.getElementById("btn-" + indiceAtual).classList.add('concluido');
                }
                
                setTimeout(() => {
                    if(indiceAtual < listaDeFrases.length - 1) {
                        mudarFrase(indiceAtual + 1);
                    } else {
                        dom.status.innerText = "🏆 ¡FELICIDADES! ¡Completaste todo el curso!";
                    }
                }, 1800);
            } else {
                tocarSomErro(); 
                dom.status.innerText = "❌ Algunas palabras fallaron. ¡Inténtalo de nuevo!";
                dom.status.style.color = "var(--error-red)";
            }
        }

        inicializarApp();
    </script>
</body>
</html>
