<!DOCTYPE html>

    <meta charset="UTF-8">

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 700px; 
            margin: 0 auto;
        }
        
        .painel-botoes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
            max-height: 200px;
            overflow-y: auto; 
        }
        
        .botao-numero {
            background-color: #e0e0e0;
            color: #333;
            border: 2px solid transparent;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 48px;
        }
        .botao-numero:hover { background-color: #d0d0d0; }
        
        .botao-numero.ativo { border: 2px solid #000; transform: scale(1.1); } 
        .botao-numero.concluido { background-color: #28a745; color: white; } 

        .frase-alvo { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .traducao { font-size: 18px; color: #666; font-style: italic; margin-bottom: 25px; }
        
        .controles-voz { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }

        .btn-gravar { background-color: #007BFF; color: white; border: none; padding: 15px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; }
        .btn-gravar:hover { background-color: #0056b3; }

        .btn-ouvir { background-color: #17a2b8; color: white; border: none; padding: 15px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; }
        .btn-ouvir:hover { background-color: #138496; }
        
        .feedback { margin-top: 15px; font-size: 16px; color: #555; font-weight: bold;}
        .resultado { font-size: 24px; margin-top: 20px; font-weight: bold; }
        
        .correto { color: #28a745; }
        .errado { color: #dc3545; text-decoration: underline; }
    </style>
</head>

        const painelBotoes = document.getElementById('painelBotoes');
        const txtFraseAlvo = document.getElementById('fraseAlvo');
        const txtTraducaoPt = document.getElementById('traducaoPt');
        const btnGravar = document.getElementById('btnGravar');
        const btnOuvir = document.getElementById('btnOuvir');
        const statusTexto = document.getElementById('status');
        const resultadoTela = document.getElementById('resultadoTela');

        let indiceAtual = 0;
        let fraseAtualEspanhol = ""; 

        // NOVO NOME no LocalStorage para não misturar com os testes antigos
        let progressoSalvo = JSON.parse(localStorage.getItem('progressoEspanholV2')) || [];

        // SISTEMA DE VOZ DO NAVEGADOR (Agora com Espanhol es-ES)
        btnOuvir.addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const robo = new SpeechSynthesisUtterance(fraseAtualEspanhol);
                robo.lang = 'es-ES'; 
                robo.rate = 0.85; 
                window.speechSynthesis.speak(robo);
            }
        });

        function criarBotoes() {
            painelBotoes.innerHTML = ""; 
            for (let i = 0; i < listaDeFrases.length; i++) {
                let botao = document.createElement("button");
                botao.innerText = i + 1;
                botao.className = "botao-numero";
                botao.id = "btn-" + i;
                
                if (progressoSalvo.includes(i)) {
                    botao.classList.add('concluido');
                }
                
                botao.addEventListener("click", () => {
                    mudarFrase(i);
                });
                painelBotoes.appendChild(botao);
            }
        }

        function mudarFrase(indice) {
            indiceAtual = indice;
            fraseAtualEspanhol = listaDeFrases[indice].es;
            txtFraseAlvo.innerText = fraseAtualEspanhol;
            txtTraducaoPt.innerText = listaDeFrases[indice].pt;
            
            document.querySelectorAll('.botao-numero').forEach(b => b.classList.remove('ativo'));
            document.getElementById("btn-" + indice).classList.add('ativo');

            resultadoTela.innerHTML = "";
            statusTexto.innerText = "Aperte en Hablar y lee la frase."; // Texto em Espanhol/Misturado para praticar
            statusTexto.style.color = "#555";
        }

        criarBotoes();
        mudarFrase(0);

        // SISTEMA DO MICROFONE (Mantido igual ao inglês, apenas mudei o idioma)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES'; // Idioma em Espanhol
            recognition.interimResults = false;

            btnGravar.addEventListener('click', () => {
                try {
                    recognition.start();
                    statusTexto.innerText = "🎤 Escuchando... ¡Habla ahora!";
                    statusTexto.style.color = "#007BFF";
                    resultadoTela.innerHTML = "";
                } catch(e) {
                    console.error("Mic error:", e);
                }
            });

            recognition.addEventListener('result', (evento) => {
                const fraseFalada = evento.results[0][0].transcript;
                statusTexto.innerText = `Você disse: "${fraseFalada}"`;
                statusTexto.style.color = "#555";
                analisarEImprimirNaTela(fraseAtualEspanhol, fraseFalada);
            });

            // Tratamento de erro silencioso para evitar travamento
            recognition.addEventListener('error', (evento) => {
                statusTexto.innerText = "❌ No entendí. Inténtalo de nuevo.";
                statusTexto.style.color = "#dc3545";
            });

        } else {
            statusTexto.innerText = "Seu navegador não suporta voz.";
        }

        // LÓGICA DE CORREÇÃO (A grande diferença está AQUI)
        function analisarEImprimirNaTela(alvo, falada) {
            
            // FUNÇÃO MÁGICA PARA O ESPANHOL: Remove ¡, ¿, pontuações e ACENTOS!
            const limparTexto = (texto) => {
                return texto.toLowerCase()
                            .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove os acentos
                            .replace(/[.,!?¡¿]/g, "") // remove toda a pontuação
                            .trim();
            };

            let alvoLimpo = limparTexto(alvo);
            let faladaLimpa = limparTexto(falada);

            let palavrasOriginais = alvo.split(" "); // Para manter as pontuações e maiúsculas na tela
            let palavrasAlvo = alvoLimpo.split(" ");
            let palavrasFaladas = faladaLimpa.split(" ");

            let htmlFinal = "";
            let acertouTudo = true; 

            for (let i = 0; i < palavrasAlvo.length; i++) {
                let palavraCerta = palavrasAlvo[i];
                let palavraDita = palavrasFaladas[i] || "";
                let palavraVisual = palabrasOriginais[i];

                if (palavraCerta === palavraDita) {
                    htmlFinal += `<span class="correto">${palavraVisual} </span>`;
                } else {
                    htmlFinal += `<span class="errado">${palavraVisual} </span>`;
                    acertouTudo = false; 
                }
            }

            resultadoTela.innerHTML = htmlFinal;

            if (acertouTudo) {
                statusTexto.innerText = "🎉 ¡Perfecto! ¡Lección completada!";
                statusTexto.style.color = "#28a745";
                
                if (!progressoSalvo.includes(indiceAtual)) {
                    progressoSalvo.push(indiceAtual);
                    localStorage.setItem('progressoEspanholV2', JSON.stringify(progressoSalvo));
                    document.getElementById("btn-" + indiceAtual).classList.add('concluido');
                }
                
                setTimeout(() => {
                    if(indiceAtual < listaDeFrases.length - 1) {
                        mudarFrase(indiceAtual + 1);
                        // Rola os botões para baixo se a lição passar do limite visível
                        document.getElementById("btn-" + (indiceAtual)).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 1500);
            } else {
                statusTexto.innerText = "❌ ¡Ups! Has fallado algunas palabras. Inténtalo de nuevo.";
                statusTexto.style.color = "#dc3545";
            }
        }
